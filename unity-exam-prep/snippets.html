<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Snippets — Unity Exam Prep</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>
<div id="nav-root"></div>
<div class="page-content">

  <div class="page-header">
    <div class="container">
      <div class="page-header-text">
        <h1>💻 Code Snippets</h1>
        <p>Copy-ready C# patterns for common Unity mechanics. Fully annotated and exam-relevant.</p>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="container">
      <span class="filter-label">Topic</span>
      <div class="filter-pills" id="topic-filters"></div>
      <select id="diff-filter" class="search-input" style="min-width:130px;">
        <option value="all">All Levels</option>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
    </div>
  </div>

  <div class="main-content">
    <div class="container">
      <div class="snippets-grid" id="snippets-grid"></div>
      <div id="empty-state" class="empty-state" style="display:none;">
        <div class="empty-state-icon">🔍</div>
        <h3>No snippets match this filter</h3>
        <p>Try adjusting the topic or difficulty filter.</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-csharp.min.js"></script>
<script src="js/nav.js"></script>
<script src="js/snippets.js"></script>
</body>
</html>
